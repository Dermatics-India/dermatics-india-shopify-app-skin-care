# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "92882f522785015d08e74946009e779f"
name = "skeencareai"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  # Requires Protected Customer Data approval in the Partner Dashboard.
  # Re-enable this block (and the "read_orders" scope below) after approval.
  # [[webhooks.subscriptions]]
  # topics = [ "orders/create" ]
  # uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Note: "read_orders" requires Protected Customer Data approval. Add it back once approved.
scopes = "read_products,write_products,read_themes,write_themes,read_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://example.com/auth/callback" ]

[app_proxy]
url = "https://example.com/api/proxy"
subpath = "derma-advisor"
prefix = "apps"
